name: Docker Publish to ACR

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  IMAGE_NAME: mdc-ghas-mock-0001
  IMAGE_TAG: mdc-ghas-integration

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Extract ACR name
        shell: bash
        run: |
          ACR_ENDPOINT="${{ secrets.ACR_ENDPOINT }}"
          ACR_NAME="${ACR_ENDPOINT%%.*}"
          echo "ACR_NAME=$ACR_NAME" >> "$GITHUB_ENV"
          echo "IMAGE_REPOSITORY=${ACR_NAME}.azurecr.io/${{ env.IMAGE_NAME }}" >> "$GITHUB_ENV"

      - name: Log in to Azure Container Registry
        run: az acr login --name "$ACR_NAME"

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_REPOSITORY }}:${{ env.IMAGE_TAG }}
